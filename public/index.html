<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Коуч</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ===== ЭКРАН ВХОДА ===== */
    #login-screen {
      position: fixed; inset: 0;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #login-screen.hidden { display: none; }

    .login-card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-card .logo {
      font-size: 2.5rem;
      text-align: center;
    }

    .login-card h1 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .login-card p {
      text-align: center;
      color: #6060a0;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.82rem; color: #8080b0; }

    .field input {
      background: #0f0f1a;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e0e0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #7c6aff; }

    .btn-primary {
      background: #7c6aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1em;
    }

    /* ===== САЙДБАР ===== */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #13131f;
      border-right: 1px solid #1e1e35;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #1e1e35;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c6aff, #4ade80);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: 700;
      flex-shrink: 0;
    }

    .user-name { font-size: 0.9rem; font-weight: 600; }
    .user-email { font-size: 0.75rem; color: #6060a0; }

    .btn-new {
      width: 100%;
      background: #1e1e35;
      border: 1px dashed #3a3a5e;
      border-radius: 10px;
      color: #a0a0c0;
      padding: 9px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-new:hover { background: #2a2a45; color: #fff; }

    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-item {
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.83rem;
      color: #9090b0;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item:hover { background: #1e1e35; color: #e0e0f0; }
    .session-item.active { background: #2a2a45; color: #fff; }

    .session-date {
      font-size: 0.72rem;
      color: #5050a0;
      margin-top: 2px;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #1e1e35;
    }

    .btn-logout {
      background: none;
      border: none;
      color: #5050a0;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 0;
    }

    .btn-logout:hover { color: #f87171; }

    /* ===== ЧАТ ===== */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid #1e1e35;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .coach-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c6aff, #4ade80);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    header h1 { font-size: 1rem; font-weight: 600; }
    header p  { font-size: 0.75rem; color: #6060a0; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #4040a0;
      font-size: 0.9rem;
    }

    .empty-state span { font-size: 2.5rem; }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 82%;
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; flex-shrink: 0; align-self: flex-end;
    }

    .msg.assistant .msg-avatar { background: linear-gradient(135deg, #7c6aff, #4ade80); }
    .msg.user .msg-avatar { background: #2a2a45; color: #a0a0c0; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.assistant .bubble {
      background: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .msg.user .bubble {
      background: #7c6aff;
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .typing .bubble { color: #5050a0; font-style: italic; }

    #input-area {
      padding: 14px 24px 20px;
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 10px;
      background: #1a1a2e;
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      border: 1px solid #2a2a45;
      transition: border-color 0.2s;
    }

    #input-row:focus-within { border-color: #7c6aff; }

    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: #e0e0f0; font-size: 0.93rem; font-family: inherit;
      resize: none; max-height: 160px; line-height: 1.5; padding: 4px 0;
    }

    textarea::placeholder { color: #404060; }

    #send-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: #7c6aff; border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s; flex-shrink: 0; align-self: flex-end;
    }

    #send-btn:hover  { opacity: 0.85; }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
    #send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🧔</div>
    <h1>Коучер Игорь</h1>
    <p>Введите имя и почту, чтобы начать.<br>Если уже были — загрузим историю.</p>
    <div class="field">
      <label>Ваше имя</label>
      <input id="login-name" type="text" placeholder="Иван Иванов" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="ivan@example.com" autocomplete="email">
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn-primary" id="login-btn">Войти</button>
  </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="user-info">
      <div class="user-avatar" id="sidebar-avatar">И</div>
      <div>
        <div class="user-name" id="sidebar-name">Имя</div>
        <div class="user-email" id="sidebar-email">email</div>
      </div>
    </div>
    <button class="btn-new" id="new-session-btn">+ Новая сессия</button>
  </div>
  <div class="sessions-list" id="sessions-list"></div>
  <div class="sidebar-footer">
    <button class="btn-logout" id="logout-btn">Выйти</button>
  </div>
</div>

<div id="chat-area">
  <header>
    <div class="coach-avatar">🧔</div>
    <div>
      <h1>Коучер Игорь</h1>
      <p id="session-subtitle">Выберите сессию или начните новую</p>
    </div>
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="Напишите что-нибудь…"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  // --- Состояние ---
  let user = null;
  let currentSessionId = null;
  let history = [];
  let isBusy = false;

  // --- Элементы ---
  const loginScreen  = document.getElementById("login-screen");
  const loginNameEl  = document.getElementById("login-name");
  const loginEmailEl = document.getElementById("login-email");
  const loginErrorEl = document.getElementById("login-error");
  const loginBtn     = document.getElementById("login-btn");

  const sidebarAvatar  = document.getElementById("sidebar-avatar");
  const sidebarName    = document.getElementById("sidebar-name");
  const sidebarEmail   = document.getElementById("sidebar-email");
  const sessionsList   = document.getElementById("sessions-list");
  const newSessionBtn  = document.getElementById("new-session-btn");
  const logoutBtn      = document.getElementById("logout-btn");
  const sessionSubtitle = document.getElementById("session-subtitle");

  const chatEl   = document.getElementById("chat");
  const inputEl  = document.getElementById("input");
  const sendBtn  = document.getElementById("send-btn");

  // --- Вход ---
  loginBtn.addEventListener("click", doLogin);
  [loginNameEl, loginEmailEl].forEach(el =>
    el.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); })
  );

  async function doLogin() {
    const name  = loginNameEl.value.trim();
    const email = loginEmailEl.value.trim();
    if (!name || !email) { loginErrorEl.textContent = "Заполните все поля"; return; }

    loginBtn.disabled = true;
    loginErrorEl.textContent = "";

    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email }),
      });
      const data = await res.json();
      if (!res.ok) { loginErrorEl.textContent = data.error; return; }

      user = data.user;
      loginScreen.classList.add("hidden");
      setupSidebar(data.sessions);
    } catch (e) {
      loginErrorEl.textContent = "Ошибка соединения";
    } finally {
      loginBtn.disabled = false;
    }
  }

  // --- Сайдбар ---
  function setupSidebar(sessions) {
    sidebarName.textContent = user.name;
    sidebarEmail.textContent = user.email;
    sidebarAvatar.textContent = user.name[0].toUpperCase();
    renderSessions(sessions);
  }

  function renderSessions(sessions) {
    sessionsList.innerHTML = "";
    if (!sessions.length) {
      sessionsList.innerHTML = '<div style="padding:12px;color:#404060;font-size:0.8rem;text-align:center">Нет сессий</div>';
      return;
    }
    sessions.forEach(s => {
      const el = document.createElement("div");
      el.className = "session-item" + (s.id === currentSessionId ? " active" : "");
      el.dataset.id = s.id;

      const date = new Date(s.created_at).toLocaleDateString("ru-RU", {
        day: "numeric", month: "short"
      });

      el.innerHTML = `<div>${escHtml(s.title)}</div><div class="session-date">${date}</div>`;
      el.addEventListener("click", () => loadSession(s.id, s.title));
      sessionsList.appendChild(el);
    });
  }

  newSessionBtn.addEventListener("click", startNewSession);

  async function startNewSession() {
    const res = await fetch("/api/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: user.id }),
    });
    const data = await res.json();
    currentSessionId = data.session_id;
    history = [];
    chatEl.innerHTML = "";
    updateActiveSession();
    sessionSubtitle.textContent = "Новая сессия";

    // Приветствие от коуча
    await sendToCoach(null);

    // Обновим список сессий
    refreshSessions();
  }

  async function loadSession(sessionId, title) {
    currentSessionId = sessionId;
    history = [];
    chatEl.innerHTML = "";
    sessionSubtitle.textContent = title;
    updateActiveSession();

    const res = await fetch(`/api/sessions/${sessionId}/messages`);
    const data = await res.json();

    data.messages.forEach(m => {
      addMessage(m.role, m.content);
      history.push({ role: m.role, content: m.content });
    });
  }

  async function refreshSessions() {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: user.name, email: user.email }),
    });
    const data = await res.json();
    renderSessions(data.sessions);
  }

  function updateActiveSession() {
    document.querySelectorAll(".session-item").forEach(el => {
      el.classList.toggle("active", parseInt(el.dataset.id) === currentSessionId);
    });
  }

  logoutBtn.addEventListener("click", () => {
    user = null;
    currentSessionId = null;
    history = [];
    chatEl.innerHTML = "";
    loginNameEl.value = "";
    loginEmailEl.value = "";
    loginScreen.classList.remove("hidden");
  });

  // --- Чат ---
  function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;

    const av  = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = role === "assistant" ? "🧔" : "👤";

    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.textContent = text;

    div.appendChild(av);
    div.appendChild(bub);
    chatEl.appendChild(div);
    scrollDown();
    return bub;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "msg assistant typing";
    div.id = "typing-indicator";

    const av  = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = "🧭";

    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.textContent = "печатает…";

    div.appendChild(av);
    div.appendChild(bub);
    chatEl.appendChild(div);
    scrollDown();
    return { div, bub };
  }

  async function sendToCoach(userText) {
    if (isBusy || !currentSessionId) return;
    isBusy = true;
    sendBtn.disabled = true;

    if (userText) {
      history.push({ role: "user", content: userText });
      addMessage("user", userText);
    }

    const { div: typingDiv, bub } = addTyping();
    typingDiv.querySelector(".bubble").textContent = "печатает…";

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: history,
          session_id: currentSessionId,
          user_message: userText || "",
        }),
      });

      if (!res.ok) throw new Error(await res.text());

      typingDiv.classList.remove("typing");
      bub.textContent = "";
      let fullText = "";

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6);
          if (payload === "[DONE]") break;
          try {
            const { text } = JSON.parse(payload);
            fullText += text;
            bub.textContent = fullText;
            scrollDown();
          } catch {}
        }
      }

      history.push({ role: "assistant", content: fullText });

      // Обновить заголовок первой сессии в сайдбаре
      if (userText) refreshSessions();

    } catch (err) {
      typingDiv.remove();
      addMessage("assistant", "Ошибка: " + err.message);
    } finally {
      isBusy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function handleSend() {
    const text = inputEl.value.trim();
    if (!text || !currentSessionId) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendToCoach(text);
  }

  sendBtn.addEventListener("click", handleSend);
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
  });

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
